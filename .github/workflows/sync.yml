name: Automated Upstream Sync

on:
  schedule:
    - cron: '0 0 * * 0' # Runs automatically every Sunday at midnight UTC
  workflow_dispatch: # Keeps a manual "Sync Now" button active in your Actions dashboard

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
    - name: Sync fork with upstream parent
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Fetching and merging upstream updates securely..."
        gh repo sync ${{ github.repository }} -b main

    - name: Trigger Multi-Arch Image Build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Forcing multi-arch compilation pipeline to process updates..."
        gh workflow run "Build Multi-Arch Docker Image" -R ${{ github.repository }}
