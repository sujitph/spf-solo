name: Automated Upstream Sync

on:
  schedule:
    - cron: '0 0 1 * *' # Runs automatically at midnight on the 1st of every month
  workflow_dispatch: # Keeps a manual "Sync Now" button active in your Actions dashboard

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants permission to merge upstream code
      actions: write  # CRITICAL: Grants permission to trigger your Docker build workflow

    steps:
    - name: Sync fork with upstream parent
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Fetching and merging upstream updates securely..."
        gh repo sync ${{ github.repository }} -b main

    - name: Force Multi-Arch Image Build (Updates Underlying OS)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Forcing a rebuild to pull the latest underlying OS security patches..."
        gh workflow run "Build Multi-Arch Docker Image" -R ${{ github.repository }}
