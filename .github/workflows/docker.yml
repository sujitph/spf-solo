name: Build Multi-Arch Docker Image

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Patch Dockerfile for Debian 12+ Compatibility
      run: |
        sed -i 's/ntp //g' Dockerfile

    - name: Generate Conflict-Free Rootless Blueprint
      run: |
        # Copy the stock Dockerfile so we don't modify the repository permanently
        cp Dockerfile Dockerfile.rootless
        
        # Append the security and healthcheck layers to the bottom of the temporary file
        echo "" >> Dockerfile.rootless
        echo "RUN groupadd -r spfgroup && useradd -r -g spfgroup -u 10001 spfuser" >> Dockerfile.rootless
        echo "RUN chown -R spfuser:spfgroup /spf-resolver || true" >> Dockerfile.rootless
        echo "USER 10001:10001" >> Dockerfile.rootless
        echo "HEALTHCHECK --interval=30s --timeout=5s --start-period=10s --retries=3 CMD nc -zu 127.0.0.1 53 || exit 1" >> Dockerfile.rootless

    - name: Set up QEMU (for multi-arch emulation)
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Multi-Arch Image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile.rootless
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/spf-solo:latest
