name: Build Multi-Arch Docker Image

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger with 1-click

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # This dynamically patches out the broken, deprecated "ntp" line 
    # right inside GitHub's memory before compiling. Your repo files stay pure.
    - name: Patch Dockerfile for Debian 12+ Compatibility
      run: |
        sed -i 's/ntp //g' Dockerfile

    - name: Set up QEMU (for multi-arch emulation)
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Multi-Arch Image
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/${{ github.actor }}/spf-solo:latest
